services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-interview-postgres
    profiles:
      - managed-postgres
    environment:
      POSTGRES_DB: ai_interview
      POSTGRES_USER: ai_interview
      POSTGRES_PASSWORD: ai_interview
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/001-init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_interview -d ai_interview"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: ai-interview-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PUBLISHED_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  localstack:
    image: localstack/localstack:3
    container_name: ai-interview-localstack
    environment:
      SERVICES: s3
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DEFAULT_REGION: us-east-1
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - localstack-data:/var/lib/localstack

volumes:
  postgres-data:
  redis-data:
  localstack-data:
