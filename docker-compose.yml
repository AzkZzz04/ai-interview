services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-interview-postgres
    profiles:
      - managed-postgres
    environment:
      POSTGRES_DB: ai_interview
      POSTGRES_USER: ai_interview
      POSTGRES_PASSWORD: ai_interview
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/001-init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_interview -d ai_interview"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: ai-interview-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PUBLISHED_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rustfs:
    image: rustfs/rustfs:latest
    container_name: ai-interview-rustfs
    command: ["/data"]
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data

volumes:
  postgres-data:
  redis-data:
  rustfs-data:
